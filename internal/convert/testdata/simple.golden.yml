services:
  api:
    image: ghcr.io/example/api:1.4.2
    environment:
      DATABASE_URL: postgres://postgres:5432/app
      LOG_LEVEL: info
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    env_file:
    - .env
    ports:
    - 3000:3000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.500"
          memory: 512Mi
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
    env_file:
    - .env
    ports:
    - 5432:5432
    volumes:
    - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
  worker:
    image: ghcr.io/example/worker:1.4.2
    command:
    - dist/worker.js
    entrypoint:
    - node
    environment:
      API_URL: http://api:3000
      DATABASE_URL: postgres://postgres:5432/app
      LOG_LEVEL: info
      REDIS_URL: redis://redis:6379
    env_file:
    - .env
    restart: unless-stopped
volumes:
  postgres-data: {}
