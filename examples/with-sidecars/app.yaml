apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      volumes:
        # Shared scratch space — main writes logs, sidecar tails them.
        # localk auto-promotes this to a named compose volume because
        # two containers reference it.
        - name: logs
          emptyDir: {}
        # Init writes a config snapshot here; main reads it.
        - name: config
          emptyDir: {}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            ["sh", "-c", "until nc -z postgres 5432; do echo waiting; sleep 1; done"]
        - name: render-config
          image: alpine:3.19
          command: ["sh", "-c", "echo 'rendered=true' > /out/runtime.conf"]
          volumeMounts:
            - name: config
              mountPath: /out
      containers:
        - name: app
          image: example/app:1.0
          ports:
            - containerPort: 8080
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CONFIG_PATH
              value: /etc/app/runtime.conf
            - name: LOG_DIR
              value: /var/log/app
            - name: ADVERTISED_HOSTNAME
              value: $(POD_NAME).app.local
          volumeMounts:
            - name: config
              mountPath: /etc/app
            - name: logs
              mountPath: /var/log/app
        - name: log-shipper
          image: fluent/fluent-bit:2.2
          volumeMounts:
            - name: logs
              mountPath: /logs
        - name: metrics-exporter
          image: example/metrics-exporter:1.0
          env:
            - name: TARGET
              # localhost works because the sidecar shares the main's
              # network namespace via network_mode: service:app.
              value: http://localhost:8080/metrics
---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  selector:
    app: app
  ports:
    - port: 8080
