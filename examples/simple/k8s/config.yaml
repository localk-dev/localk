apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
data:
  LOG_LEVEL: info
  DATABASE_URL: postgres://postgres:5432/app
  REDIS_URL: redis://redis:6379
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
type: Opaque
stringData:
  DB_USER: app
  DB_PASSWORD: localdev-please-change
  JWT_SECRET: super-secret-change-me
