version: 2

project_name: localk

before:
  hooks:
    - go mod tidy

builds:
  - id: localk
    main: ./cmd/localk
    binary: localk
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

# Homebrew tap. Uncomment after creating the localk-dev/homebrew-tap repo and
# providing a GH_PAT secret with `repo` scope. Until then leave commented so
# releases don't fail.
#
# brews:
#   - repository:
#       owner: localk-dev
#       name: homebrew-tap
#       token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
#     directory: Formula
#     homepage: https://localk.dev
#     description: Run your Kubernetes stack locally with one command.
#     license: MIT
#     install: |
#       bin.install "localk"
#     test: |
#       system "#{bin}/localk", "version"

release:
  github:
    owner: localk-dev
    name: localk
  draft: false
  prerelease: auto
